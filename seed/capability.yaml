# Capability layer: roles → standard skills. A person's capability = union of
# the skills of the roles they hold (matched by Person.role_label).
# Skills are deduplicated by name across roles.
roles:
  - name: "Менеджер проекта"
    description: "Ведёт проект, держит сроки и команду."
    skills:
      - { name: "Управление командой", description: "Распределять работу, мотивировать, снимать блокеры." }
      - { name: "Постановка задач", description: "Чётко формулировать задачи, ставить сроки и приоритеты." }
      - { name: "Контроль сроков", description: "Следить за дедлайнами и прогрессом, реагировать на риски." }
      - { name: "Деловая коммуникация", description: "Грамотно вести переписку и созвоны, держать деловой тон." }

  - name: "Менеджер по продажам"
    description: "Работает с клиентом, готовит и согласует КП."
    skills:
      - { name: "Деловая коммуникация", description: "Грамотно вести переписку и созвоны, держать деловой тон." }
      - { name: "Ведение переговоров", description: "Согласовывать условия и сроки с клиентом." }
      - { name: "Подготовка КП", description: "Собирать и оформлять коммерческое предложение." }
      - { name: "Работа с клиентом", description: "Брифовать клиента, уточнять требования, вести коммуникацию." }

  - name: "Аналитик"
    description: "Исследует рынок и требования, считает метрики."
    skills:
      - { name: "Анализ рынка", description: "Исследовать рынок, конкурентов и аудиторию." }
      - { name: "Конкурентный анализ", description: "Сравнивать предложения конкурентов, выделять преимущества." }
      - { name: "Сбор требований", description: "Вытаскивать и структурировать требования из брифа/встречи." }
      - { name: "Работа с метриками", description: "Считать и интерпретировать показатели, делать выводы." }

  - name: "Копирайтер"
    description: "Пишет и редактирует тексты КП."
    skills:
      - { name: "Копирайтинг", description: "Писать понятные продающие и информационные тексты." }
      - { name: "Редактура", description: "Вычитывать и улучшать тексты, держать стиль." }
      - { name: "Структурирование текста", description: "Выстраивать логику и структуру документа." }

  - name: "Дизайнер"
    description: "Делает визуал и вёрстку КП (внешний пул)."
    skills:
      - { name: "Дизайн макетов", description: "Создавать макеты и графику." }
      - { name: "Визуальная концепция", description: "Придумывать визуальный язык предложения." }
      - { name: "Вёрстка КП", description: "Собирать финальный дизайн-макет КП." }
      - { name: "Прототипирование", description: "Собирать кликабельные прототипы." }

  - name: "Технический специалист"
    description: "Отвечает за техническое решение и оценку."
    skills:
      - { name: "Техническое решение", description: "Определять архитектуру и подход к реализации." }
      - { name: "Оценка трудоёмкости", description: "Оценивать объём и бюджет работ." }
      - { name: "Техническая валидация", description: "Проверять решение на реализуемость и риски." }
