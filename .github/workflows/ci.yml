name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      # Dummy values so import-time settings validation passes; unit tests are IO-free.
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
      REDIS_URL: redis://localhost:6379/0
      BOT_TOKEN: "0:ci-dummy-token"
      ANTHROPIC_API_KEY: "sk-ant-ci-dummy"
      TEAM_CHAT_ID: "1"
      JWT_SECRET: "ci-dummy-secret-long-enough-000000000000"
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Unit tests (IO-free)
        run: uv run pytest tests/unit -q
