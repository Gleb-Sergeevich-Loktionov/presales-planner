version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: planner
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - planner-network

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - planner-network

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"          # FastAPI admin board
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - whisper_cache:/root/.cache    # persist faster-whisper model across restarts
    networks:
      - planner-network

volumes:
  postgres_data:
  whisper_cache:

networks:
  planner-network:
    driver: bridge
